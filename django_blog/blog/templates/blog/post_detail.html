{% extends "blog/base.html" %}
{% block content %}
  <h2>{{ post.title }}</h2>
  <p><em>By {{ post.author.username }} on {{ post.published_date|date:"M d, Y" }}</em></p>
  <p>{{ post.content }}</p>

  {% if user == post.author %}
    <a href="{% url 'blog:post_update' post.pk %}">Edit</a> |
    <a href="{% url 'blog:post_delete' post.pk %}">Delete</a>
  {% endif %}
  <p><a href="{% url 'blog:post_list' %}">Back to all posts</a></p>
{% endblock %}
